
services:
  # ---------------------------------------------------------
  # Module: XSS (Cross-Site Scripting)
  # Port: 3000
  # ---------------------------------------------------------
  xss-app:
    build: ../vulnerable-apps/xss-app
    container_name: vapt-xss-lab
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: Privilege Escalation
  # Port: 2222 (SSH)
  # Features: Vulnerable SSH container with SUID/Sudo issues
  # ---------------------------------------------------------
  privesc-app:
    build: ../vulnerable-apps/privesc-app
    container_name: vapt-privesc-lab
    ports:
      - "2222:22"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: SQL Injection
  # Port: 8080 (Web) / 3306 (DB Local)
  # Features: Setup a vulnerable LAMP/LEMP stack for SQLi
  # ---------------------------------------------------------
  sqli-db:
    image: mariadb:10.6
    container_name: vapt-sqli-db
    environment:
      - MARIADB_ROOT_PASSWORD=rootpass
      - MARIADB_DATABASE=app_db
      - MARIADB_USER=dbuser
      - MARIADB_PASSWORD=dbpass
    # Initialize DB with mock users
    command: --init-file /data/application/init.sql
    volumes:
      - ./sqli-init.sql:/data/application/init.sql
    networks:
      - vapt_net

  sqli-web:
    image: php:7.4-apache
    container_name: vapt-sqli-web
    depends_on:
      - sqli-db
    ports:
      - "8080:80"
    volumes:
      - ../vulnerable-apps/sqli-app:/var/www/html
    # Install MySQL extension for PHP
    command: bash -c "docker-php-ext-install mysqli && apache2-foreground"
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: Metasploit 
  # Port: 8081, 2121
  # Features: Vulnerable FTP (vsftpd 2.3.4 Smiley Face Backdoor) 
  # ---------------------------------------------------------
  metasploit-app:
    build: ../vulnerable-apps/vsftpd-app
    container_name: vapt-metasploit-lab
    ports:
      - "2121:21"
      - "6200:6200"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: Exploitation
  # Port: 8082, 2122
  # ---------------------------------------------------------
  exploitation-app:
    build: ../vulnerable-apps/anon-ftp-app
    container_name: vapt-exploitation-lab
    ports:
      - "2122:21"
      - "21000-21010:21000-21010"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: AITM (Adversary in the Middle)
  # Port: 8080
  # Features: Server, Victim, and Attacker
  # ---------------------------------------------------------
  aitm-server:
    image: nginxdemos/hello:plain-text
    container_name: aitm_server
    ports:
      - "8080:80"
    networks:
      aitm_net:
        ipv4_address: 10.10.10.80

  aitm-victim:
    image: alpine:latest
    container_name: aitm_victim
    command: >
      /bin/sh -c "
      apk update && apk add curl &&
      while true; do
        echo '[Victim] Accessing mock server...';
        curl -s -X POST -d 'username=admin&password=SuperSecretPassword123' http://10.10.10.80:80/login;
        sleep 10;
      done"
    networks:
      aitm_net:
        ipv4_address: 10.10.10.2

  aitm-attacker:
    image: kalilinux/kali-rolling
    container_name: aitm_attacker
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: >
      /bin/sh -c "
      echo 'Installing necessary networking tools...';
      apt-get update && apt-get install -y bettercap iproute2 net-tools procps tcpdump dsniff arp-scan &&
      echo 'Tools installed. Attacker container ready.' &&
      tail -f /dev/null"
    networks:
      aitm_net:
        ipv4_address: 10.10.10.10

  # ---------------------------------------------------------
  # Module: Password Attacks
  # Features: Alpine generating local hashes
  # ---------------------------------------------------------
  password-app:
    image: alpine:latest
    container_name: vapt-password-lab
    command: /bin/sh -c "echo 'admin:$$1$$jkl$$pL/Zz9kKxZ.7x/.q2Kk' > /tmp/hashes.txt && tail -f /dev/null"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: PrivEsc via XSS (Admin CSRF)
  # Port: 3001
  # Features: Vulnerable internal forum where stored XSS 
  #           forces the victim's browser to make Admin requests
  # ---------------------------------------------------------
  privesc-xss-app:
    build: ../vulnerable-apps/privesc-xss-app
    container_name: vapt-privesc-xss-lab
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: Social Engineering
  # Port: 8001
  # Features: Serves a dummy Corporate SSO page for SET cloning
  # ---------------------------------------------------------
  social-engineering-app:
    image: nginx:alpine
    container_name: vapt-social-engineering-lab
    ports:
      - "8001:80"
    command: >
      /bin/sh -c "echo '<html><head><title>Corporate SSO</title></head><body style=\"font-family: Arial; text-align: center; margin-top: 50px; background-color: #f4f4f9;\"><h2>Corporate Single Sign-On Portal</h2><div style=\"width: 300px; margin: 0 auto; background: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);\"><form action=\"/login\" method=\"POST\"><input type=\"text\" placeholder=\"Employee ID\" style=\"width: 90%; padding: 10px; margin-bottom: 15px;\"><input type=\"password\" placeholder=\"Password\" style=\"width: 90%; padding: 10px; margin-bottom: 15px;\"><button type=\"submit\" style=\"width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none;\">Secure Login</button></form></div></body></html>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"
    restart: unless-stopped
    networks:
      - vapt_net

  # ---------------------------------------------------------
  # Module: Security Controls
  # Port: 8002
  # Features: ModSecurity WAF reverse-proxying example.com
  # ---------------------------------------------------------
  security-controls-app:
    image: coreruleset/modsecurity-crs:apache
    container_name: vapt-security-controls-lab
    environment:
      - BACKEND=http://example.com
    ports:
      - "8002:80"
    restart: unless-stopped
    networks:
      - vapt_net

networks:
  vapt_net:
    driver: bridge

  aitm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
