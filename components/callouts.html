<!-- Callout Components: Use these to highlight important information -->

<!-- Tip Callout -->
<div class="callout tip">
  <div class="icon">💡</div>
  <div class="content">
    <strong>Pro Tip:</strong> {{content}}
  </div>
</div>

<!-- Warning Callout -->
<div class="callout warning">
  <div class="icon">⚠️</div>
  <div class="content">
    <strong>Warning:</strong> {{content}}
  </div>
</div>

<!-- Deep Dive Callout -->
<div class="callout deep">
  <div class="icon">🔍</div>
  <div class="content">
    <strong>Deep Dive:</strong> {{content}}
  </div>
</div>

<!-- Lab Callout -->
<div class="callout lab">
  <div class="icon">🧪</div>
  <div class="content">
    <strong>Lab Time:</strong> {{content}}
  </div>
</div>
